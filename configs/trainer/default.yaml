# PyTorch Lightning Trainer defaults.
#
# Instantiated inside TrainableLightningRouter.fit().
# Override any field on the CLI:
#   python run.py experiment=tafs/synthetic trainer.max_epochs=100
#
# AdamW + linear warmup + cosine annealing schedule is controlled by the
# model (see TrainableLightningRouter.configure_optimizers), not here.

_target_: pytorch_lightning.Trainer
max_epochs: 200
gradient_clip_val: 1.0
precision: 32              # overridden to bf16-mixed on capable hardware
accelerator: auto
devices: 1
log_every_n_steps: 20
enable_progress_bar: true
enable_model_summary: false
deterministic: false
